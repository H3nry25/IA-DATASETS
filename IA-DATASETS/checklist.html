<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist de Modelos de Machine Learning</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 30px;
        background-color: #f8f9fa;
        color: #333;
    }
    .container {
        max-width: 600px;
        margin: 0 auto;
        background: #fff;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 25px;
        border-bottom: 2px solid #ecf0f1;
        padding-bottom: 10px;
    }
    .task-list {
        list-style-type: none;
        padding-left: 0;
    }
    .main-task {
        font-weight: bold;
        font-size: 1.2em;
        margin-top: 20px;
        color: #2c3e50;
        border-left: 4px solid #3498db;
        padding-left: 10px;
    }
    .subtask-list {
        list-style-type: none;
        padding-left: 20px;
        margin-top: 10px;
        margin-bottom: 15px;
    }
    .subtask-list li {
        margin-bottom: 8px;
    }
    label {
        cursor: pointer;
        display: flex;
        align-items: center;
        font-size: 1em;
    }
    input[type="checkbox"] {
        margin-right: 10px;
        width: 16px;
        height: 16px;
        cursor: pointer;
    }
    input[type="checkbox"]:checked + span {
        text-decoration: line-through;
        color: #7f8c8d;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Checklist de Tareas de ML</h2>

    <ul class="task-list">
        <li>
            <div class="main-task">Diabetes</div>
            <ul class="subtask-list">
                <li><label><input type="checkbox"><span>1. Preprocesamiento</span></label></li>
                <li><label><input type="checkbox"><span>2. Regresión logística</span></label></li>
                <li><label><input type="checkbox"><span>3. KNN</span></label></li>
                <li><label><input type="checkbox"><span>4. Decision tree</span></label></li>
                <li><label><input type="checkbox"><span>5. Random Forest</span></label></li>
            </ul>
        </li>

        <li>
            <div class="main-task">Titanic</div>
            <ul class="subtask-list">
                <li><label><input type="checkbox"><span>1. Preprocesamiento</span></label></li>
                <li><label><input type="checkbox"><span>2. Regresión logística</span></label></li>
                <li><label><input type="checkbox"><span>3. KNN</span></label></li>
                <li><label><input type="checkbox"><span>4. Decision tree</span></label></li>
                <li><label><input type="checkbox"><span>5. Random Forest</span></label></li>
            </ul>
        </li>

        <li>
            <div class="main-task">Cáncer de Mama</div>
            <ul class="subtask-list">
                <li><label><input type="checkbox"><span>1. Preprocesamiento</span></label></li>
                <li><label><input type="checkbox"><span>2. Regresión logística</span></label></li>
                <li><label><input type="checkbox"><span>3. KNN</span></label></li>
                <li><label><input type="checkbox"><span>4. Decision tree</span></label></li>
                <li><label><input type="checkbox"><span>5. Random Forest</span></label></li>
            </ul>
        </li>
    </ul>
</div>

</body>
</html>
